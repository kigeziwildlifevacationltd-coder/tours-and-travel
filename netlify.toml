[build]
  command = "npm ci --include=dev && npm run build"
  publish = "dist"

[build.environment]
  NPM_FLAGS = "--include=dev"
  VITE_SITE_URL = "https://kigeziwildlifevacationsafaris.com"

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=31536000"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
